<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>산양중학교 홍보 챗봇</title>
    <style>
        :root {
            --kakao-yellow: #FEE500;
            --chat-bg: #BACEE0;
            --user-bubble: #FEE500;
            --bot-bubble: #FFFFFF;
        }

        * { box-sizing: border-box; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
        body { margin: 0; padding: 0; background-color: var(--chat-bg); height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        header {
            background-color: #f8f8f8;
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn { font-size: 20px; margin-right: 15px; cursor: pointer; color: #333; }
        .profile-info h1 { margin: 0; font-size: 16px; color: #000; }
        .profile-info p { margin: 0; font-size: 12px; color: #666; }

        /* Chat Window */
        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.5; position: relative; word-break: break-all; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bot { align-self: flex-start; background-color: var(--bot-bubble); color: #000; border-top-left-radius: 2px; }
        .user { align-self: flex-end; background-color: var(--user-bubble); color: #000; border-top-right-radius: 2px; }

        /* Quick Replies */
        #quick-replies {
            padding: 10px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            background: rgba(255,255,255,0.3);
            white-space: nowrap;
        }
        #quick-replies::-webkit-scrollbar { display: none; }
        .chip {
            background: #fff;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid #ddd;
            cursor: pointer;
        }

        /* Input Area */
        #input-area {
            background: #fff;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #user-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            background: #f9f9f9;
        }
        #send-btn {
            background: var(--kakao-yellow);
            border: none;
            width: 40px;
            height: 32px;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #333;
        }
        #send-btn svg { width: 20px; height: 20px; fill: currentColor; }
    </style>
</head>

        sendBtn.addEventListener('click', sendMessage);

        function showHelp() {
            const helpText = "🌟 **산양 선배에게 이런 걸 물어봐!** 🌟\n\n" +
                             "🍱 **먹거리:** 급식 맛있어? 매점 있어? 오늘의 메뉴 뭐야?\n" +
                             "⛳ **학교시설:** 골프 연습장 있어? 체육관 좋아? 화장실 깨끗해?\n" +
                             "🚌 **특별혜택:** 수학여행 공짜야? 버스비 100원 진짜야?\n" +
                             "👗 **복장규정:** 교복 예뻐? 사복 입는 날 있어? 화장해도 돼?\n" +
                             "🐱 **동아리:** 고양이 동아리 뭐야? 동아리 뭐 있어?\n" +
                             "📝 **공부/시험:** 시험 어려워? 숙제 많아? 자유학기제 뭐야?\n" +
                             "👫 **학교생활:** 선생님 무서워? 친구 사귈 수 있어?\n\n" +
                             "키워드만 넣어서 짧게 물어봐도 다 대답해줄게! 😊";
            addMessage("어떤 게 궁금하니? 도움말을 보여줄게!", 'user');
            setTimeout(() => {
                addMessage(helpText, 'bot');
            }, 600);
        }

        function quickAsk(text) {
            userInput.value = text;
            sendMessage();
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            userInput.value = '';

            setTimeout(() => {
                let reply = "";
                // 모든 키워드 검사 (부분 일치 포함)
                for (const key in responses) {
                    if (message.includes(key)) {
                        reply = responses[key];
                        break;
                    }
                }

                if (!reply) {
                    reply = "앗, 그건 내가 아직 잘 모르는 내용이야... 😅 하지만 '산양알리미' 앱의 질문 게시판에 남겨주면 선배들이나 선생님들이 대답해주실 거야! 아니면 내년에 우리 산양중학교에 꼭 와서 나한테 직접 물어봐줘! 기다리고 있을게~ 🌲✨";
                }
                addMessage(reply, 'bot');
            }, 600);
        }
    </script>
</body>
</html>
