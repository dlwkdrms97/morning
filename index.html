<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이-온 (I-ON) | 교사용 인사이트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { 50: '#fff7ed', 100: '#ffedd5', 500: '#f97316', 600: '#ea580c' } }, borderRadius: { '4xl': '2rem', '5xl': '3rem' } } } }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; transition: all 0.5s; }
        .dark body { background-color: #050505; color: #f1f5f9; }
        .title-font { font-family: 'Gaegu', cursive; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass { background: rgba(20, 20, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.03); }
        .bento-card { background: white; border-radius: 2.5rem; border: 1px solid #e2e8f0; transition: all 0.3s; overflow: hidden; }
        .dark .bento-card { background: #141414; border-color: #222; }
        .tab-active { background: white; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1); color: #f97316; }
        .dark .tab-active { background: #262626; color: #fb923c; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .gradient-orange { background: linear-gradient(135deg, #f97316 0%, #fb923c 100%); }
    </style>
</head>
<body class="min-h-screen no-scrollbar">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const supabaseClient = supabase.createClient('https://uylrclocdtkninhctmit.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5bHJjbG9jZHRrbmluaGN0bWl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNTczMjAsImV4cCI6MjA5MDczMzMyMH0.7X2AcYlIMK161wi1mAGaiPnWxbdydTwMiET0X4q6jEs');

        const SESSION_TIMEOUT_MS = 60 * 60 * 1000;

        const App = () => {
            const [isVerified, setIsVerified] = useState(sessionStorage.getItem('ion_verified') === 'true');
            const [vCode, setVCode] = useState('');
            const [teacher, setTeacher] = useState(JSON.parse(localStorage.getItem('ion_teacher')));
            const [activeTab, setActiveTab] = useState('morning');
            const [data, setData] = useState({ morning: [], class: [], reflect: [], students: [], heart: [] });
            
            const getKSTDate = () => {
                const now = new Date();
                const offset = now.getTimezoneOffset() * 60000;
                return new Date(now - offset).toISOString().split('T')[0];
            };

            const [selectedDate, setSelectedDate] = useState(getKSTDate());
            const [loading, setLoading] = useState(false);
            const [selectedIds, setSelectedIds] = useState([]);
            const [darkMode, setDarkMode] = useState(localStorage.getItem('ion_dark') === 'true');
            const [showHelp, setShowHelp] = useState(false);
            const [newStudent, setNewStudent] = useState({ number: '', name: '', pin: '' });
            const fileInputRef = useRef(null);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', darkMode);
                localStorage.setItem('ion_dark', darkMode);
            }, [darkMode]);

            const fetchData = async () => {
                if(!teacher) return;
                setLoading(true);
                const cp = `${teacher.grade}-${teacher.classNum}`;
                const start = `${selectedDate}T00:00:00`;
                const end = `${selectedDate}T23:59:59`;
                try {
                    const [m, c, r, s, h] = await Promise.all([
                        supabaseClient.from('morning_checkin').select('*').eq('user_class', cp).gte('created_at', start).lte('created_at', end).order('created_at', { ascending: false }),
                        supabaseClient.from('class_preparation').select('*').eq('user_class', cp).gte('created_at', start).lte('created_at', end),
                        supabaseClient.from('reflect_record').select('*').eq('user_class', cp).gte('created_at', start).lte('created_at', end),
                        supabaseClient.from('student_info').select('*').eq('user_class', cp).order('user_number', { ascending: true }),
                        supabaseClient.from('heart_on').select('*').eq('user_class', cp).order('created_at', { ascending: false })
                    ]);
                    setData({ morning: m.data||[], class: c.data||[], reflect: r.data||[], students: s.data||[], heart: h.data||[] });
                } catch (e) { console.error(e); } finally { setLoading(false); }
            };

            useEffect(() => { if(teacher) fetchData(); }, [teacher, selectedDate]);

            const downloadCSV = () => {
                const list = data[activeTab] || [];
                if (list.length === 0) return alert('데이터가 없습니다.');
                const headers = Object.keys(list[0]);
                const rows = list.map(row => headers.map(h => JSON.stringify(row[h] || '')).join(','));
                const csv = "\uFEFF" + [headers.join(','), ...rows].join('\r\n');
                const link = document.createElement("a");
                link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
                link.download = `ION_${activeTab}_${selectedDate}.csv`; link.click();
            };

            const handleExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const wb = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
                        const jsonData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                        const cp = `${teacher.grade}-${teacher.classNum}`;
                        const students = jsonData.map(r => ({ user_class: cp, user_number: String(r['번호']||r['학번']||''), user_name: String(r['이름']||r['성명']||''), pin: String(r['PIN']||r['핀']||'1234') })).filter(s => s.user_number && s.user_name);
                        const { error } = await supabaseClient.from('student_info').insert(students);
                        if(error) throw error;
                        alert('일괄 등록 완료'); fetchData();
                    } catch (err) { alert(err.message); }
                };
                reader.readAsArrayBuffer(file);
            };

            const toggleSelect = (id) => setSelectedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            const toggleSelectAll = (list) => setSelectedIds(selectedIds.length === list.length ? [] : list.map(i => i.id));
            
            const handleDelete = async () => {
                if(!confirm(`${selectedIds.length}개를 영구 삭제하시겠습니까?`)) return;
                const tableMap = { morning: 'morning_checkin', class: 'class_preparation', reflect: 'reflect_record', heart: 'heart_on', students: 'student_info' };
                const { error } = await supabaseClient.from(tableMap[activeTab]).delete().in('id', selectedIds);
                if(!error) { setSelectedIds([]); fetchData(); }
            };

            const handleAddStudent = async () => {
                if(!newStudent.number || !newStudent.name || !newStudent.pin) return alert('정보 입력 필요');
                const cp = `${teacher.grade}-${teacher.classNum}`;
                const { error } = await supabaseClient.from('student_info').insert([{ user_class: cp, user_number: newStudent.number, user_name: newStudent.name, pin: newStudent.pin }]);
                if(!error) { setNewStudent({number:'', name:'', pin:''}); fetchData(); }
            };

            const HelpModal = () => (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/60 backdrop-blur-md animate-in fade-in">
                    <div className="bento-card max-w-2xl w-full max-h-[80vh] overflow-y-auto p-10 space-y-8 dark:bg-zinc-900 border-none shadow-2xl no-scrollbar">
                        <div className="flex justify-between items-center border-b dark:border-white/5 pb-6">
                            <h2 className="text-3xl font-black dark:text-white">아이-온 가이드 📖</h2>
                            <button onClick={()=>setShowHelp(false)} className="w-10 h-10 rounded-full bg-gray-100 dark:bg-white/5 font-bold">×</button>
                        </div>
                        <div className="space-y-6 text-sm leading-relaxed text-gray-500">
                            <section><h3 className="text-orange-500 font-black mb-2">🌅 Morning ON</h3><p>학생 기분과 3대 미션 완료 현황을 확인합니다. 1도는 상담요함으로 자동 강조됩니다.</p></section>
                            <section><h3 className="text-teal-500 font-black mb-2">🎒 Class ON</h3><p>교시별 수업 준비 목표를 확인합니다. 늘품반 학생은 IB 학습자상으로 표시됩니다.</p></section>
                            <section><h3 className="text-purple-500 font-black mb-2">✨ Reflect ON</h3><p>수업 성찰 별점과 내용을 확인합니다. 정규화 데이터를 기반으로 기록됩니다.</p></section>
                            <section><h3 className="text-red-500 font-black mb-2">❤️ HEART ON</h3><p>학생들의 비밀 상담 편지함입니다. 읽지 않은 편지는 빨간색 NEW 배지가 표시됩니다.</p></section>
                            <section><h3 className="text-blue-500 font-black mb-2">👤 학생 관리</h3><p>학생 추가, 삭제, 비밀번호(PIN) 확인이 가능합니다. 엑셀로 명단을 일괄 등록할 수 있습니다.</p></section>
                        </div>
                        <button onClick={()=>setShowHelp(false)} className="w-full py-5 rounded-[2rem] bg-brand-500 text-white font-black text-xl">가이드 닫기</button>
                    </div>
                </div>
            );

            if (!isVerified) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[#f8fafc] dark:bg-[#050505]">
                    <div className="bento-card p-12 max-w-sm w-full text-center space-y-8 border-none shadow-2xl">
                        <img src="logo.png" className="w-24 h-24 mx-auto object-contain" />
                        <h2 className="text-3xl font-black title-font text-orange-600">관리자 인증</h2>
                        <input type="password" value={vCode} onChange={e=>setVCode(e.target.value)} onKeyDown={e=>e.key==='Enter' && (vCode==='1010'?(setIsVerified(true),sessionStorage.setItem('ion_verified','true')):alert('오류'))} placeholder="••••" className="w-full p-5 rounded-3xl bg-gray-50 dark:bg-zinc-900 border-none text-center font-bold text-2xl tracking-[0.5em] outline-none" />
                        <button onClick={()=>vCode==='1010'?(setIsVerified(true),sessionStorage.setItem('ion_verified','true')):alert('오류')} className="w-full py-5 rounded-3xl bg-brand-500 text-white font-black text-xl hover:bg-brand-600 transition-all">인증하기</button>
                    </div>
                </div>
            );

            if (!teacher) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[#f1f5f9] dark:bg-[#050505]">
                    <div className="bento-card p-12 max-w-md w-full text-center space-y-10 border-none shadow-2xl">
                        <img src="logo.png" className="w-24 h-24 mx-auto object-contain" />
                        <h2 className="text-4xl font-black dark:text-white leading-tight">선생님, 안녕하세요!<br/><span className="text-orange-500 italic">I-ON Insight</span></h2>
                        <div className="grid grid-cols-2 gap-4">
                            <select id="g" className="p-5 rounded-3xl bg-gray-50 dark:bg-zinc-900 font-bold outline-none"><option value="">학년</option><option value="1">1학년</option><option value="2">2학년</option><option value="3">3학년</option></select>
                            <select onChange={e=>{
                                const g = document.getElementById('g').value;
                                if(g && e.target.value) { const info = {grade:g, classNum:e.target.value}; setTeacher(info); localStorage.setItem('ion_teacher', JSON.stringify(info)); }
                            }} className="p-5 rounded-3xl bg-gray-50 dark:bg-zinc-900 font-bold outline-none"><option value="">반</option><option value="1">1반</option><option value="2">2반</option><option value="늘품">늘품반</option></select>
                        </div>
                    </div>
                </div>
            );

            const unreadHeart = data.heart.filter(h => !h.is_read).length;
            const currentTabList = data[activeTab] || [];

            return (
                <div className="min-h-screen flex flex-col pb-20">
                    {showHelp && <HelpModal />}
                    <header className="p-6 md:p-8 flex justify-between items-center sticky top-0 z-50 glass border-b dark:border-white/5">
                        <div className="flex items-center gap-4">
                            <img src="logo.png" className="w-12 h-12 object-contain" />
                            <div><h1 className="text-xl font-black dark:text-white tracking-tighter uppercase italic">I-ON Insight</h1><p className="text-[10px] font-bold text-orange-500 uppercase tracking-widest">{teacher.grade}학년 {teacher.classNum}반</p></div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={()=>setShowHelp(true)} className="w-12 h-12 rounded-2xl glass flex items-center justify-center text-xl font-black text-orange-500 hover:scale-110 transition-transform">?</button>
                            <button onClick={()=>setDarkMode(!darkMode)} className="w-12 h-12 rounded-2xl glass flex items-center justify-center text-xl">{darkMode?'☀️':'🌙'}</button>
                            <button onClick={()=>{localStorage.removeItem('ion_teacher'); setTeacher(null);}} className="text-xs font-bold text-gray-400 hover:text-red-500">로그아웃</button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto w-full p-6 md:p-10 space-y-10 animate-in fade-in duration-700">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                            {[ { label: 'Today Check-in', value: data.morning.length, unit: '명', color: 'text-blue-500' }, { label: 'Avg Temp', value: data.morning.length ? (data.morning.reduce((a,c)=>a+c.temp,0)/data.morning.length).toFixed(1) : 0, unit: '도', color: 'text-orange-500' }, { label: 'Learning Records', value: data.reflect.length, unit: '건', color: 'text-purple-500' }, { label: 'Heart Letter', value: unreadHeart, unit: '건', color: 'text-red-500', alert: unreadHeart > 0 } ].map((s, idx) => (
                                <div key={idx} className="bento-card p-8 flex flex-col justify-between h-44 shadow-sm border-none dark:bg-zinc-900">
                                    <span className={`text-[10px] font-black uppercase tracking-widest ${s.color}`}>{s.label}</span>
                                    <h3 className={`text-5xl font-black dark:text-white ${s.alert ? 'animate-bounce text-red-500' : ''}`}>{s.value}<span className="text-xl text-gray-300 ml-1 font-medium">{s.unit}</span></h3>
                                </div>
                            ))}
                        </div>

                        <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-4">
                                <div className="flex p-1.5 glass rounded-[2rem] shadow-inner overflow-x-auto no-scrollbar">
                                    {['morning','class','reflect','heart','students'].map(t => (
                                        <button key={t} onClick={()=>{setActiveTab(t); setSelectedIds([]);}} className={`px-8 py-3 rounded-3xl text-[10px] font-black transition-all whitespace-nowrap ${activeTab===t ? 'tab-active' : 'text-gray-400'}`}>
                                            {t.toUpperCase()} {t==='heart'&&unreadHeart>0&&`(${unreadHeart})`}
                                        </button>
                                    ))}
                                </div>
                                {selectedIds.length > 0 && <button onClick={handleDelete} className="px-6 py-3 bg-red-500 text-white rounded-[2rem] font-black text-[10px] shadow-lg animate-in zoom-in">🗑️ {selectedIds.length}개 삭제</button>}
                            </div>
                            <div className="flex items-center gap-3">
                                <button onClick={downloadCSV} className="px-6 py-3 rounded-[2rem] bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400 text-[10px] font-black border border-green-100 dark:border-green-900/30 hover:bg-green-500 hover:text-white transition-all">📥 데이터 내보내기</button>
                                <div className="glass px-6 py-3 rounded-[2rem] flex items-center gap-4"><input type="date" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)} className="bg-transparent font-black text-orange-500 outline-none cursor-pointer" /></div>
                            </div>
                        </div>

                        <div className="bento-card border-none shadow-2xl">
                            {loading ? <div className="p-32 text-center font-black text-gray-300 animate-pulse">SYNCHRONIZING...</div> : (
                                <div className="p-4 md:p-8">
                                    {activeTab === 'heart' ? (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                            {currentTabList.length === 0 ? <div className="col-span-full py-32 text-center font-black text-gray-200 text-5xl italic tracking-tighter uppercase">No Letters</div> : currentTabList.map(h => (
                                                <div key={h.id} className={`p-8 rounded-[3rem] border-2 transition-all relative ${h.is_read ? 'bg-gray-50/50 dark:bg-white/5 border-transparent' : 'bg-white dark:bg-zinc-900 border-red-100 shadow-xl'}`}>
                                                    <div className="flex justify-between items-start mb-6">
                                                        <div className="flex items-center gap-3"><div className="w-12 h-12 bg-red-50 dark:bg-red-900/20 rounded-2xl flex items-center justify-center text-xl">❤️</div><div><p className="font-black dark:text-white">{h.user_name}</p><p className="text-[10px] font-bold text-gray-400">{new Date(h.created_at).toLocaleString()}</p></div></div>
                                                        <input type="checkbox" checked={selectedIds.includes(h.id)} onChange={()=>toggleSelect(h.id)} className="w-6 h-6 rounded-xl accent-red-500 cursor-pointer" />
                                                    </div>
                                                    <p className="bg-gray-50 dark:bg-zinc-800 p-6 rounded-3xl mb-6 min-h-[100px] text-sm font-medium dark:text-gray-300">"{h.content}"</p>
                                                    <div className="flex gap-3">
                                                        {!h.is_read && <button onClick={async()=>{await supabaseClient.from('heart_on').update({is_read:true}).eq('id',h.id); fetchData();}} className="flex-1 py-4 bg-red-500 text-white rounded-2xl font-black text-xs shadow-lg">읽음 확인</button>}
                                                        <button onClick={async()=>{if(confirm('삭제?')){await supabaseClient.from('heart_on').delete().eq('id',h.id); fetchData();}}} className="px-6 py-4 bg-gray-100 dark:bg-zinc-800 text-gray-400 rounded-2xl font-bold text-xs hover:bg-red-500 transition-colors">삭제</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="overflow-x-auto">
                                            {activeTab === 'students' && (
                                                <div className="flex flex-wrap gap-4 p-8 bg-blue-50 dark:bg-blue-900/10 rounded-[3rem] items-end mb-10 border-4 border-white dark:border-zinc-800">
                                                    <input type="number" placeholder="번호" value={newStudent.number} onChange={e=>setNewStudent({...newStudent, number:e.target.value})} className="w-20 p-4 rounded-2xl bg-white dark:bg-gray-800 font-bold outline-none" />
                                                    <input type="text" placeholder="이름" value={newStudent.name} onChange={e=>setNewStudent({...newStudent, name:e.target.value})} className="w-32 p-4 rounded-2xl bg-white dark:bg-gray-800 font-bold outline-none" />
                                                    <input type="password" placeholder="PIN" value={newStudent.pin} onChange={e=>setNewStudent({...newStudent, pin:e.target.value})} className="w-24 p-4 rounded-2xl bg-white dark:bg-gray-800 font-bold outline-none" />
                                                    <button onClick={handleAddStudent} className="px-8 py-4 bg-blue-600 text-white rounded-2xl font-black text-xs">추가 👤+</button>
                                                    <div className="h-12 w-px bg-gray-200 dark:bg-gray-700 mx-4"></div>
                                                    <button onClick={() => fileInputRef.current.click()} className="px-8 py-4 bg-green-600 text-white rounded-2xl font-black text-xs">📂 일괄 등록</button>
                                                    <input type="file" ref={fileInputRef} onChange={handleExcelUpload} className="hidden" accept=".xlsx,.xls,.csv" />
                                                </div>
                                            )}
                                            <table className="w-full text-left">
                                                <thead>
                                                    <tr className="text-gray-400 text-[10px] font-black uppercase tracking-widest border-b dark:border-white/5">
                                                        <th className="p-6 w-10"><input type="checkbox" onChange={()=>toggleSelectAll(currentTabList)} checked={currentTabList.length>0 && selectedIds.length===currentTabList.length} className="w-6 h-6 rounded-xl accent-orange-500 cursor-pointer" /></th>
                                                        <th className="p-6">Time / No.</th><th className="p-6">Name</th>
                                                        {activeTab==='morning' && <><th className="p-6">Temp</th><th className="p-6">Status</th><th className="p-6 text-center">Missions</th></>}
                                                        {activeTab==='class' && <th className="p-6">Subject / Goal</th>}
                                                        {activeTab==='reflect' && <><th className="p-6 text-center">Rating</th><th className="p-6">Content</th></>}
                                                        {activeTab==='students' && <><th className="p-6 text-center">PIN SECURITY</th><th className="p-6 text-center">Registered</th></>}
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y dark:divide-white/5">
                                                    {currentTabList.map(i => (
                                                        <tr key={i.id} className={`group transition-all ${selectedIds.includes(i.id)?'bg-orange-50 dark:bg-orange-900/10':'hover:bg-gray-50/50 dark:hover:bg-white/5'}`}>
                                                            <td className="p-6"><input type="checkbox" checked={selectedIds.includes(i.id)} onChange={()=>toggleSelect(i.id)} className="w-6 h-6 rounded-xl accent-orange-500 cursor-pointer" /></td>
                                                            <td className="p-6 text-[10px] font-bold text-gray-400">{activeTab==='students' ? `${i.user_number}번` : new Date(i.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</td>
                                                            <td className="p-6 font-black dark:text-white">{i.user_name}</td>
                                                            {activeTab==='morning' && <>
                                                                <td className="p-6 text-3xl">{['☁️','⛅','☀️','🌈','🔥'][i.temp-1]}</td>
                                                                <td className="p-6"><span className={`px-3 py-1.5 rounded-full text-[10px] font-black shadow-sm ${i.temp<=1?'bg-red-500 text-white animate-pulse':'bg-green-500 text-white'}`}>{i.temp<=1?'상담요함':'정상상태'}</span></td>
                                                                <td className="p-6 text-center"><div className="flex justify-center gap-1">{i.missions?.map((m,idx)=><span key={idx} className="w-6 h-6 rounded-full bg-blue-50 dark:bg-blue-900/20 text-blue-500 flex items-center justify-center text-[10px] font-black border border-blue-100">✓</span>)}<span className="text-[10px] font-bold text-gray-300 ml-1">{i.missions?.length || 0}/3</span></div></td>
                                                            </>}
                                                            {activeTab==='class' && <td className="p-6 font-bold text-teal-600 text-sm">{i.period} {i.subject_name || i.subject} <span className="text-gray-300 font-normal text-[10px] ml-2 tracking-tight opacity-80">| 목표: {i.goal}</span></td>}
                                                            {activeTab==='reflect' && <><td className="p-6 text-yellow-400 text-2xl text-center tracking-tighter">{'★'.repeat(i.rating)}</td><td className="p-6 text-sm font-medium text-gray-500 dark:text-gray-400 leading-relaxed"><span className="text-purple-500 font-black block text-[10px] mb-1">[{i.period || '-'} / {i.subject || '-'}]</span>"{i.content || i.reflection}"</td></>}
                                                            {activeTab==='students' && <><td className="p-6 text-center text-gray-300 group-hover:text-blue-500 font-mono text-xl tracking-widest transition-all"><span className="group-hover:hidden">••••</span><span className="hidden group-hover:inline">{i.pin}</span></td><td className="p-6 text-[10px] text-gray-400 font-bold text-center">{new Date(i.created_at).toLocaleDateString()}</td></>}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                            {currentTabList.length===0 && <div className="py-32 text-center font-black text-gray-200 dark:text-zinc-800 text-4xl italic tracking-tighter uppercase">No Records Found</div>}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </main>
                    <footer className="p-10 text-center text-[10px] font-black text-gray-300 dark:text-zinc-800 uppercase tracking-[0.5em]">© 2026 I-ON INSIGHT | PROFESSIONAL EDUCATION TOOL</footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
