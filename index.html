<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아침 맞이 체크인 - 송건, 현동규</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');
        
        body { 
            font-family: 'Gaegu', cursive, sans-serif; 
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .btn-student { 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .btn-student:active { 
            transform: scale(0.9) rotate(-2deg); 
        }
        .main-container {
            max-height: 95vh;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        .main-container::-webkit-scrollbar {
            display: none;
        }
        .title-text {
            font-family: 'Gaegu', cursive;
            letter-spacing: -1px;
        }
        .check-item {
            transition: all 0.3s ease;
        }
        .check-item:active {
            transform: translateX(10px);
        }
    </style>
</head>
<body class="bg-sky-50">
    <div id="root" class="w-full flex justify-center"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 구글 앱 스크립트 배포 URL을 여기에 넣어주세요!
        const GAS_WEB_APP_URL = "YOUR_GAS_WEB_APP_URL_HERE";

        const App = () => {
            const [mode, setMode] = useState(''); // 'morning', 'class'
            const [step, setStep] = useState('select-mode'); // select-mode, select-student, select-subject, select-emotion, checklist, class-checklist, success
            const [selectedStudent, setSelectedStudent] = useState('');
            const [selectedSubject, setSelectedSubject] = useState('');
            const [emotion, setEmotion] = useState(0);
            const [checklist, setChecklist] = useState({
                item1: false, item2: false, item3: false, item4: false
            });
            const [classChecklist, setClassChecklist] = useState({
                book: false, note: false, ibook: false, pencil: false
            });

            // 오디오 객체 생성
            const clickAudio = useRef(new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3')); // Pop
            const completeAudio = useRef(new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3')); // Bell
            const successAudio = useRef(new Audio('https://assets.mixkit.co/active_storage/sfx/1433/1433-preview.mp3')); // Fanfare

            const playSound = (type) => {
                let audio;
                if (type === 'click') audio = clickAudio.current;
                else if (type === 'complete') audio = completeAudio.current;
                else if (type === 'success') audio = successAudio.current;
                
                if (audio) {
                    audio.currentTime = 0;
                    audio.play().catch(e => console.log("Audio play blocked"));
                }
            };

            const students = ['송건', '현동규'];
            const subjects = ['국어', '수학', '사회', '진로와 직업'];
            const emotions = [
                { value: 1, emoji: '😞', label: '속상해요' },
                { value: 2, emoji: '😕', label: '그냥그래요' },
                { value: 3, emoji: '🙂', label: '괜찮아요' },
                { value: 4, emoji: '😊', label: '기분좋아요' },
                { value: 5, emoji: '🤩', label: '너무신나요!' }
            ];

            const handleModeSelect = (selectedMode) => {
                playSound('click');
                setMode(selectedMode);
                setStep('select-student');
            };

            const handleStudentSelect = (name) => {
                playSound('click');
                setSelectedStudent(name);
                if (mode === 'morning') {
                    setStep('select-emotion');
                } else {
                    setStep('select-subject'); // 수업 준비 시 과목 선택으로 이동
                }
            };

            const handleSubjectSelect = (sub) => {
                playSound('click');
                setSelectedSubject(sub);
                setStep('class-checklist');
            };

            const handleEmotionSelect = (val) => {
                playSound('click');
                setEmotion(val);
                setStep('checklist');
            };

            const toggleCheck = (item) => {
                playSound('complete');
                setChecklist(prev => ({ ...prev, [item]: !prev[item] }));
            };

            const toggleClassCheck = (item) => {
                playSound('complete');
                setClassChecklist(prev => ({ ...prev, [item]: !prev[item] }));
            };

            const allMorningChecked = Object.values(checklist).every(v => v === true);
            const allClassChecked = Object.values(classChecklist).every(v => v === true);

            const handleSubmit = async () => {
                playSound('success');
                const emotionLabel = emotions.find(e => e.value === emotion)?.label || "";
                const emotionString = emotion > 0 ? `${emotion} (${emotionLabel})` : "-";
                
                const data = {
                    mode: mode === 'morning' ? "아침등교" : `수업준비(${selectedSubject})`,
                    student: selectedStudent,
                    emotion: emotionString,
                    details: mode === 'morning' 
                        ? `인사:${checklist.item1},폰:${checklist.item2},노트:${checklist.item3},거울:${checklist.item4}`
                        : `과목:${selectedSubject},교과서:${classChecklist.book},노트:${classChecklist.note},아이북:${classChecklist.ibook},필기구:${classChecklist.pencil}`,
                    date: new Date().toLocaleString()
                };

                if (GAS_WEB_APP_URL !== "YOUR_GAS_WEB_APP_URL_HERE") {
                    try {
                        const queryParams = new URLSearchParams(data).toString();
                        fetch(`${GAS_WEB_APP_URL}?${queryParams}`, { mode: 'no-cors' });
                    } catch (e) { console.error(e); }
                }

                setStep('success');
                setTimeout(() => resetApp(), 5000);
            };

            const resetApp = () => {
                setMode('');
                setStep('select-mode');
                setSelectedStudent('');
                setSelectedSubject('');
                setEmotion(0);
                setChecklist({ item1: false, item2: false, item3: false, item4: false });
                setClassChecklist({ book: false, note: false, ibook: false, pencil: false });
            };

            return (
                <div className="main-container bg-white p-4 md:p-6 rounded-[3rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] w-[90%] max-w-3xl text-center border-[8px] border-white flex flex-col justify-center overflow-hidden ring-4 ring-sky-100">
                    {step === 'select-mode' && (
                        <div className="py-2 w-full">
                            <h1 className="title-text text-4xl md:text-6xl font-bold text-sky-500 mb-8 leading-tight drop-shadow-sm text-center">무엇을 도와줄까요? ✨</h1>
                            <div className="flex flex-col md:flex-row justify-center gap-4 md:gap-8 items-stretch px-4">
                                <button 
                                    onClick={() => handleModeSelect('morning')}
                                    className="btn-student bg-gradient-to-b from-orange-100 to-orange-200 hover:from-orange-200 hover:to-orange-300 text-orange-800 p-6 md:p-10 rounded-[3rem] shadow-xl border-b-[10px] border-orange-400 w-full flex flex-col items-center justify-center transition-all"
                                >
                                    <span className="text-5xl md:text-7xl mb-2">☀️</span>
                                    <span className="text-3xl md:text-5xl font-bold whitespace-nowrap">아침 등교</span>
                                </button>
                                <button 
                                    onClick={() => handleModeSelect('class')}
                                    className="btn-student bg-gradient-to-b from-green-100 to-green-200 hover:from-green-200 hover:to-green-300 text-green-800 p-6 md:p-10 rounded-[3rem] shadow-xl border-b-[10px] border-green-400 w-full flex flex-col items-center justify-center transition-all"
                                >
                                    <span className="text-5xl md:text-7xl mb-2">📚</span>
                                    <span className="text-3xl md:text-5xl font-bold whitespace-nowrap">수업 준비</span>
                                </button>
                            </div>
                        </div>
                    )}

                    {step === 'select-student' && (
                        <div className="py-2 w-full">
                            <h1 className="title-text text-3xl md:text-5xl font-bold text-sky-500 mb-6 leading-tight drop-shadow-sm text-center px-4">
                                {mode === 'morning' ? "등교한 학생은 누구인가요? ✨" : "누구의 수업 준비를 도와줄까요? 📚"}
                            </h1>
                            <div className="grid grid-cols-2 gap-4 md:gap-6 px-4">
                                {students.map(name => (
                                    <button 
                                        key={name}
                                        onClick={() => handleStudentSelect(name)}
                                        className="btn-student bg-gradient-to-b from-yellow-100 to-yellow-200 hover:from-yellow-200 hover:to-yellow-300 text-sky-800 p-6 md:p-10 rounded-[2.5rem] shadow-lg border-b-[10px] border-yellow-400 active:border-b-0 active:translate-y-[8px] w-full flex items-center justify-center"
                                    >
                                        <span className="text-4xl md:text-6xl font-bold whitespace-nowrap">{name}</span>
                                    </button>
                                ))}
                            </div>
                            <button onClick={resetApp} className="mt-8 text-xl font-bold text-gray-400 hover:text-sky-500 transition-colors underline decoration-dotted whitespace-nowrap">처음으로 돌아가기</button>
                        </div>
                    )}

                    {step === 'select-subject' && (
                        <div className="py-2 w-full">
                            <h1 className="title-text text-3xl md:text-5xl font-bold text-green-500 mb-6 leading-tight drop-shadow-sm text-center px-4">어떤 수업인가요? 📖</h1>
                            <div className="grid grid-cols-2 gap-4 md:gap-6 px-4">
                                {subjects.map(sub => (
                                    <button 
                                        key={sub}
                                        onClick={() => handleSubjectSelect(sub)}
                                        className="btn-student bg-gradient-to-b from-green-50 to-green-100 hover:from-green-100 hover:to-green-200 text-green-800 p-6 md:p-8 rounded-[2.5rem] shadow-lg border-b-[10px] border-green-300 w-full flex items-center justify-center"
                                    >
                                        <span className="text-3xl md:text-5xl font-bold whitespace-nowrap">{sub}</span>
                                    </button>
                                ))}
                            </div>
                            <button onClick={resetApp} className="mt-8 text-xl font-bold text-gray-400 hover:text-sky-500 transition-colors underline decoration-dotted whitespace-nowrap">처음으로 돌아가기</button>
                        </div>
                    )}

                    {step === 'select-emotion' && (
                        <div className="py-2">
                            <h2 className="title-text text-3xl md:text-4xl font-bold text-sky-500 mb-6 leading-tight">{selectedStudent} 학생,<br/>지금 기분이 어떤가요? 🌈</h2>
                            <div className="grid grid-cols-3 md:grid-cols-5 gap-2 md:gap-4">
                                {emotions.map(e => (
                                    <button 
                                        key={e.value}
                                        onClick={() => handleEmotionSelect(e.value)}
                                        className="bg-white hover:bg-sky-50 p-4 md:p-5 rounded-[1.5rem] border-4 border-sky-100 hover:border-sky-300 transition-all shadow-md flex flex-col items-center justify-center group"
                                    >
                                        <div className="text-4xl md:text-6xl mb-2 group-hover:scale-110 transition-transform">{e.emoji}</div>
                                        <div className="text-lg md:text-xl font-bold text-gray-500">{e.label}</div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {step === 'checklist' && (
                        <div className="py-1">
                            <h2 className="title-text text-2xl md:text-3xl font-bold text-sky-500 mb-2">아침 미션을 완료해봅시다! 📝</h2>
                            <div className="space-y-1 md:space-y-2 mb-4 max-w-2xl mx-auto">
                                {[
                                    { id: 'item1', label: '👋 다정하게 인사하기' },
                                    { id: 'item2', label: '📱 휴대폰 제출하기' },
                                    { id: 'item3', label: '📓 오무배노트 챙기기' },
                                    { id: 'item4', label: '🪞 단정하게 거울보기' }
                                ].map(item => (
                                    <div 
                                        key={item.id}
                                        onClick={() => toggleCheck(item.id)}
                                        className={`check-item p-2 md:p-3 rounded-[1.2rem] text-lg md:text-2xl font-bold cursor-pointer border-2 md:border-4 transition-all flex items-center justify-between ${checklist[item.id] ? 'bg-green-100 border-green-400 text-green-700 shadow-inner' : 'bg-gray-50 border-gray-200 text-gray-400 shadow-md'}`}
                                    >
                                        <span className="whitespace-nowrap">{item.label}</span>
                                        <span className="text-2xl md:text-4xl">{checklist[item.id] ? '✅' : '⬜'}</span>
                                    </div>
                                ))}
                            </div>
                            <button 
                                onClick={handleSubmit}
                                disabled={!allMorningChecked}
                                className={`w-full max-w-sm mx-auto py-2 md:py-4 rounded-[2rem] text-xl md:text-3xl font-bold shadow-xl transition-all ${allMorningChecked ? 'bg-gradient-to-r from-sky-400 to-blue-500 text-white hover:from-sky-500 hover:to-blue-600 scale-105' : 'bg-gray-300 text-white cursor-not-allowed opacity-50'}`}
                            >
                                아침 미션 완료! 🚀
                            </button>
                        </div>
                    )}

                    {step === 'class-checklist' && (
                        <div className="py-1">
                            <h2 className="title-text text-2xl md:text-3xl font-bold text-green-500 mb-2">{selectedSubject} 준비물을 챙겨봅시다! 📚</h2>
                            <div className="space-y-1 md:space-y-2 mb-4 max-w-2xl mx-auto">
                                {[
                                    { id: 'book', label: '📖 이번 시간 교과서' },
                                    { id: 'note', label: '📓 오무배노트' },
                                    { id: 'ibook', label: '💻 아이북(iBook)' },
                                    { id: 'pencil', label: '✏️ 필기구(연필, 지우개)' }
                                ].map(item => (
                                    <div 
                                        key={item.id}
                                        onClick={() => toggleClassCheck(item.id)}
                                        className={`check-item p-2 md:p-3 rounded-[1.2rem] text-lg md:text-2xl font-bold cursor-pointer border-2 md:border-4 transition-all flex items-center justify-between ${classChecklist[item.id] ? 'bg-green-100 border-green-400 text-green-700 shadow-inner' : 'bg-gray-50 border-gray-200 text-gray-400 shadow-md'}`}
                                    >
                                        <span className="whitespace-nowrap">{item.label}</span>
                                        <span className="text-2xl md:text-4xl">{classChecklist[item.id] ? '✅' : '⬜'}</span>
                                    </div>
                                ))}
                            </div>
                            <button 
                                onClick={handleSubmit}
                                disabled={!allClassChecked}
                                className={`w-full max-w-sm mx-auto py-2 md:py-4 rounded-[2rem] text-xl md:text-3xl font-bold shadow-xl transition-all ${allClassChecked ? 'bg-gradient-to-r from-green-400 to-teal-500 text-white hover:from-green-500 hover:to-teal-600 scale-105' : 'bg-gray-300 text-white cursor-not-allowed opacity-50'}`}
                            >
                                수업 준비 완료! 🚀
                            </button>
                        </div>
                    )}

                    {step === 'success' && (
                        <div className="py-1 md:py-2 flex flex-col items-center justify-center overflow-hidden">
                            <div className="text-[3rem] md:text-[4rem] mb-1 animate-bounce text-center drop-shadow-xl">🌟🎊🌟</div>
                            <h2 className="title-text text-xl md:text-3xl font-bold text-sky-500 mb-1 whitespace-nowrap px-4">{selectedStudent} 학생, 정말 대단해요!</h2>
                            <p className="text-base md:text-xl text-gray-400 font-bold px-4 whitespace-nowrap">
                                {mode === 'morning' ? "오늘 하루도 신나게 보내봅시다! 화이팅! 💪" : `${selectedSubject} 준비 끝! 즐겁게 수업에 참여해봅시다! 📖`}
                            </p>
                            <div className="mt-3 text-sm md:text-base text-gray-300 font-bold animate-pulse">잠시 후 처음 화면으로 돌아갑니다...</div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
